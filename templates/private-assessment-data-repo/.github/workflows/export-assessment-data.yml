name: Export Assessment Data

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build CSV exports
        run: node scripts/export-assessment-data.mjs

      - name: Commit exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports
          git diff --cached --quiet || git commit -m "Update assessment exports"
          git push
